<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>原価差異ナレッジAI</title>

  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin: 20px;
      background: #f5f5f5;
    }

    h1 {
      margin-bottom: 12px;
    }

    textarea {
      width: 100%;
      height: 120px;
      padding: 8px;
      font-size: 14px;
      box-sizing: border-box;
    }

    button {
      margin-top: 8px;
      padding: 6px 16px;
      font-size: 14px;
      cursor: pointer;
    }

    #answer {
      margin-top: 16px;
      padding: 12px;
      background: #ffffff;
      border-radius: 6px;
      border: 1px solid #ddd;
    }

    #references {
      margin-top: 16px;
    }

    .ref-item {
      background: #ffffff;
      border-radius: 6px;
      border: 1px solid #e0e0e0;
      padding: 10px 12px;
      margin-bottom: 10px;
      font-size: 13px;
      line-height: 1.5;
      box-shadow: 0 1px 2px rgba(0,0,0,0.05);
    }

    .ref-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
      font-size: 12px;
      color: #555;
    }

    .tag {
      padding: 2px 6px;
      border-radius: 4px;
      color: #ffffff;
      font-size: 11px;
      margin-right: 4px;
      display: inline-block;
    }

    .tag-材料費 { background: #0078d4; }
    .tag-価格差異 { background: #d40000; }
    .tag-数量差異 { background: #009944; }
    .tag-工数差異 { background: #ff8c00; }
    .tag-不良・歩留まり { background: #8a2be2; }
    .tag-設備 { background: #4444ff; }
    .tag-外注費 { background: #00aaaa; }
    .tag-その他 { background: #777777; }

    .score {
      font-weight: 600;
    }

    .date {
      margin-left: auto;
      font-size: 11px;
      color: #888;
    }

    #drop-zone {
      width: 100%;
      padding: 40px;
      border: 2px dashed #4a90e2;
      border-radius: 10px;
      text-align: center;
      color: #4a90e2;
      margin-top: 30px;
      font-size: 18px;
      background: #ffffff;
    }
    #drop-zone.dragover {
      background-color: #e8f3ff;
    }

    #upload-status {
      margin-top: 10px;
      font-size: 14px;
      color: #444;
    }

    #preview {
      margin-top: 30px;
      padding: 15px;
      background: #fff;
      border-radius: 8px;
      border: 1px solid #ddd;
    }

    .preview-item {
      padding: 8px;
      border-bottom: 1px solid #eee;
    }

    .edit-btn {
      margin-left: 10px;
      padding: 2px 6px;
      font-size: 11px;
      cursor: pointer;
    }
  </style>
</head>

<body>
  <h1>原価差異ナレッジAI</h1>

  <textarea id="query" placeholder="質問を入力してください"></textarea>
  <br />
  <button onclick="sendQuery()">送信</button>

  <div id="answer"></div>

  <h3>参照理由文</h3>
  <div id="references"></div>

  <h3>ファイル取り込み</h3>
  <div id="drop-zone">ここにフォルダをドラッグ＆ドロップ</div>
  <div id="upload-status"></div>

  <h3>抽出結果プレビュー</h3>
  <div id="preview"></div>

  <script>
    async function sendQuery() {
      const query = document.getElementById("query").value.trim();
      if (!query) return;

      const res = await fetch("/generate", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ query })
      });

      const data = await res.json();

      document.getElementById("answer").innerText = data.answer || "";

      if (Array.isArray(data.references)) {
        data.references.sort((a, b) => b.score - a.score);
        renderReferences(data.references);
      }
    }

    function renderReferences(refs) {
      const container = document.getElementById("references");
      container.innerHTML = "";

      refs.forEach(r => {
        const div = document.createElement("div");
        div.className = "ref-item";

        const tagClass = "tag-" + r.tag;

        div.innerHTML = `
          <div class="ref-header">
            <span class="tag ${tagClass}">${r.tag}</span>
            <span class="score">重み: ${r.score}</span>
            <span class="date">${r.created_at}</span>
          </div>
          <div class="ref-body">
            ${r.reason}
          </div>
        `;
        container.appendChild(div);
      });
    }

    const dropZone = document.getElementById("drop-zone");
    const uploadStatus = document.getElementById("upload-status");
    const preview = document.getElementById("preview");

    dropZone.addEventListener("dragover", (e) => {
      e.preventDefault();
      dropZone.classList.add("dragover");
    });

    dropZone.addEventListener("dragleave", () => {
      dropZone.classList.remove("dragover");
    });

    dropZone.addEventListener("drop", async (e) => {
      e.preventDefault();
      dropZone.classList.remove("dragover");

      uploadStatus.innerText = "アップロード中…";

      const items = e.dataTransfer.items;
      let files = [];

      for (const item of items) {
        const entry = item.webkitGetAsEntry();
        if (entry && entry.isDirectory) {
          await readDirectory(entry, files);
        } else if (entry && entry.isFile) {
          entry.file((file) => files.push(file));
        }
      }

      await uploadFiles(files);
    });

    function readDirectory(directoryEntry, files) {
      return new Promise((resolve) => {
        const reader = directoryEntry.createReader();
        reader.readEntries(async (entries) => {
          for (const entry of entries) {
            if (entry.isFile) {
              entry.file((file) => files.push(file));
            } else if (entry.isDirectory) {
              await readDirectory(entry, files);
            }
          }
          resolve();
        });
      });
    }

    async function uploadFiles(files) {
      const formData = new FormData();
      files.forEach(file => formData.append("files", file));

      const res = await fetch("/upload_files", {
        method: "POST",
        body: formData
      });

      const data = await res.json();

      uploadStatus.innerText = "取り込み完了！";

      renderPreview(data.results);
    }

    function renderPreview(results) {
      preview.innerHTML = "";

      results.forEach(r => {
        const div = document.createElement("div");
        div.className = "preview-item";

        div.innerHTML = `
          <strong>${r.file}</strong>（${r.type}）
          <button class="edit-btn" onclick="openEdit()">編集</button>
          <div style="margin-top:6px; font-size:13px;">
            ${r.extracted_texts.slice(0, 5).join("<br>")}
            ${r.extracted_texts.length > 5 ? "<br>…（続きあり）" : ""}
          </div>
        `;

        preview.appendChild(div);
      });
    }

    function openEdit() {
      // 最新の理由文一覧から編集したいものを選ぶ運用を想定
      // シンプルに一覧画面に飛ばす代わりに、ここでは直で /edit を開く
      window.location.href = "/edit?id=1"; // 必要ならここを拡張（一覧→選択）にしていく
    }
  </script>
</body>
</html>
